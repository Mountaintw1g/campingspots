services:
  - type: web
    name: taltkartan-api
    runtime: node
    plan: free
    region: frankfurt
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/places
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
